<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <meta name="description" content="{{ config.description }}">
    <meta name="author" content="{{ config.extra.author }}">

    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock og_title %}">
    <meta property="og:description" content="{{ config.description }}">
    <meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">
    <meta property="og:image" content="{{ get_url(path="img/avatar.png") }}">
    <meta name="twitter:card" content="summary">

    <link rel="stylesheet" href="{{ get_url(path="css/style.css") }}">
    <link rel="preload" as="font" type="font/woff2" crossorigin href="{{ get_url(path="fonts/jetbrains-mono.woff2") }}">
    <link rel="preload" as="font" type="font/woff2" crossorigin href="{{ get_url(path="fonts/quattrocento-400.woff2") }}">
    <link rel="icon" type="image/png" href="{{ get_url(path="favicon.png") }}">
</head>
<body class="bg-background text-foreground font-sans antialiased selection:bg-primary selection:text-primary-foreground">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary text-primary-foreground px-4 py-2 rounded-md z-[100]">
        Skip to main content
    </a>

    {% include "partials/nav.html" %}

    <main id="main-content">
        {% block content %}{% endblock content %}
    </main>

    {% include "partials/footer.html" %}

    <script>
        document.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
            const scrolled = (scrollTop / (scrollHeight - clientHeight)) * 100;
            document.getElementById('scroll-progress').style.width = `${scrolled}%`;
        }, { passive: true });

        // Shared dialog behavior: lock background scroll (preserving position) + backdrop close.
        // position:fixed keeps the exact scroll spot so closing doesn't jump to top.
        let _openDialogs = 0, _lockY = 0;
        const _showModal = HTMLDialogElement.prototype.showModal;
        HTMLDialogElement.prototype.showModal = function () {
            if (_openDialogs++ === 0) {
                _lockY = window.scrollY;
                Object.assign(document.body.style, { position: 'fixed', top: `-${_lockY}px`, width: '100%' });
            }
            return _showModal.call(this);
        };
        document.addEventListener('close', e => {
            if (e.target.tagName === 'DIALOG' && --_openDialogs === 0) {
                Object.assign(document.body.style, { position: '', top: '', width: '' });
                window.scrollTo({ top: _lockY, behavior: 'instant' });
            }
        }, true);
        document.addEventListener('click', e => {
            if (e.target.tagName === 'DIALOG' && e.target.open) e.target.close();
        });
    </script>
</body>
</html>
